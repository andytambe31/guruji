<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>Guruji</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" type="image/png" href="./icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Guruji" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <!-- Boot splash — shown instantly (before the modules run), faded out once
       the first view is ready so the app never opens on a blank frame. -->
  <div id="splash" class="splash" role="status" aria-label="Loading Guruji">
    <div class="splash-mark">Guruji</div>
    <div class="splash-bar"><span></span></div>
  </div>

  <div id="app" class="app">
    <header id="topbar" class="topbar">
      <a href="#/now" class="brand">Guruji</a>
      <a href="#/data" data-route="data" class="topbar-action" aria-label="Import or export your data">Data</a>
    </header>
    <main id="view" class="view" aria-live="polite"></main>
    <nav id="nav" class="nav" hidden>
      <a href="#/now"  data-route="now"  class="nav-item">Now</a>
      <a href="#/day"  data-route="day"  class="nav-item">Day</a>
      <a href="#/plan" data-route="plan" class="nav-item">Plan</a>
      <a href="#/roadmap" data-route="roadmap" class="nav-item">Path</a>
    </nav>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
